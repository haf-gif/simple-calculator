<!DOCTYPE html>
<html>
<head>
    <title>Modern Calculator</title>
    <style>
        body { 
            background: linear-gradient(45deg, #f3ec78, #af4261); /* Gradient */
            height: 100vh; display: flex; justify-content: center; align-items: center;
            transition: 0.5s;
        }
        .dark-mode { background: #2c3e50; color: white; }
        .calc-box { 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(10px); 
            padding: 20px; border-radius: 15px; 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
    </style>
</head>
<body>
    <div class="calc-box">
        <h2>Calculator</h2>
        <input type="number" id="n1"> + <input type="number" id="n2">
        <button onclick="calc()">Calculate</button>
        <p id="res">Result: </p>
        <button onclick="document.body.classList.toggle('dark-mode')">Toggle Dark Mode</button>
    </div>

    <script>
        function calc() {
            let sum = parseFloat(document.getElementById('n1').value) + parseFloat(document.getElementById('n2').value);
            document.getElementById('res').innerText = "Result: " + sum;
        }
    </script>
</body>
</html>
