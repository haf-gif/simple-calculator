<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Glass Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 320px;
        }

        input {
            width: 100%;
            height: 60px;
            border: none;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            color: white;
            text-align: right;
            padding: 15px;
            font-size: 1.8rem;
            margin-bottom: 20px;
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 18px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .equal {
            background: #ff9f0a;
            grid-column: span 2;
        }

        .equal:hover {
            background: #ffb340;
        }

        .history {
            margin-top: 20px;
            font-size: 0.85rem;
            max-height: 120px;
            overflow-y: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            padding-top: 15px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Scrollbar styling for history */
        .history::-webkit-scrollbar { width: 5px; }
        .history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <input type="text" id="screen" readonly placeholder="0">
        
        <div class="buttons">
            <button onclick="clearScreen()" style="color: #ff4d4d;">C</button>
            <button onclick="addValue('/')">/</button>
            <button onclick="addValue('*')">*</button>
            <button onclick="addValue('-')">-</button>
            
            <button onclick="addValue('7')">7</button>
            <button onclick="addValue('8')">8</button>
            <button onclick="addValue('9')">9</button>
            <button onclick="addValue('+')">+</button>
            
            <button onclick="addValue('4')">4</button>
            <button onclick="addValue('5')">5</button>
            <button onclick="addValue('6')">6</button>
            <button onclick="calculate()" class="equal">=</button>
            
            <button onclick="addValue('1')">1</button>
            <button onclick="addValue('2')">2</button>
            <button onclick="addValue('3')">3</button>
            <button onclick="addValue('0')">0</button>
        </div>

        <div class="history" id="historyLog">History:</div>
    </div>

    <script>
        let screen = document.getElementById('screen');
        let historyLog = document.getElementById('historyLog');

        function addValue(v) {
            screen.value += v;
        }

        function clearScreen() {
            screen.value = "";
        }

        function calculate() {
            try {
                if (screen.value === "") return;
                let expression = screen.value;
                let res = eval(expression);
                
                // History update
                let newEntry = document.createElement('div');
                newEntry.innerHTML = `<span>${expression} = ${res}</span>`;
                historyLog.insertBefore(newEntry, historyLog.firstChild.nextSibling);
                
                screen.value = res;
            } catch (e) {
                screen.value = "Error";
                setTimeout(clearScreen, 1500);
            }
        }
    </script>
</body>
</html>
