<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Pro Glass Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #09081e 0%, #1c1a4b 50%, #15143a 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7);
            width: 340px;
        }

        .calc-display {
            width: 100%;
            height: 70px;
            border: none;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            color: white;
            text-align: right;
            padding: 18px;
            font-size: 2.2rem;
            margin-bottom: 25px;
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            padding: 20px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.22);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        button:active { transform: translateY(0); }

        .op-btn { background: rgba(255, 159, 10, 0.15); color: #ff9f0a; }
        .sci-btn { background: rgba(0, 122, 255, 0.1); color: #007aff; }
        
        .equal {
            background: #ff9f0a;
            grid-column: span 2;
            box-shadow: 0 5px 15px rgba(255, 159, 10, 0.4);
        }
        .equal:hover { background: #ffb340; }

        .history {
            margin-top: 25px;
            font-size: 0.9rem;
            max-height: 100px;
            overflow-y: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            color: rgba(255, 255, 255, 0.6);
        }
        .history::-webkit-scrollbar { width: 5px; }
        .history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <input type="text" id="screen" class="calc-display" readonly placeholder="0">
        
        <div class="buttons">
            <button onclick="clearScreen()" style="color: #ff4d4d; font-weight: bold;">C</button>
            <button onclick="sciFunc('sqrt')" class="sci-btn">√</button>
            <button onclick="sciFunc('pi')" class="sci-btn">π</button>
            <button onclick="addValue('/')" class="op-btn">/</button>
            
            <button onclick="addValue('7')">7</button>
            <button onclick="addValue('8')">8</button>
            <button onclick="addValue('9')">9</button>
            <button onclick="addValue('*')" class="op-btn">×</button>
            
            <button onclick="addValue('4')">4</button>
            <button onclick="addValue('5')">5</button>
            <button onclick="addValue('6')">6</button>
            <button onclick="addValue('-')" class="op-btn">−</button>
            
            <button onclick="addValue('1')">1</button>
            <button onclick="addValue('2')">2</button>
            <button onclick="addValue('3')">3</button>
            <button onclick="addValue('+')" class="op-btn">+</button>
            
            <button onclick="addValue('0')">0</button>
            <button onclick="addValue('.')">.</button>
            <button onclick="calculate()" class="equal">=</button>
        </div>

        <div class="history" id="historyLog">History:</div>
    </div>

    <script>
        let screen = document.getElementById('screen');
        let historyLog = document.getElementById('historyLog');

        function addValue(v) { screen.value += v; }
        function clearScreen() { screen.value = ""; }

        function sciFunc(type) {
            if (type === 'sqrt') {
                if(screen.value !== "") {
                    screen.value = Math.sqrt(eval(screen.value));
                }
            } else if (type === 'pi') {
                screen.value += Math.PI.toFixed(4);
            }
        }

        function calculate() {
            try {
                if (screen.value === "") return;
                let expression = screen.value;
                let res = eval(expression);
                
                // History update - new entries on top
                let newEntry = document.createElement('div');
                newEntry.innerHTML = `<span>${expression} = ${res}</span>`;
                historyLog.insertBefore(newEntry, historyLog.firstChild.nextSibling);
                
                screen.value = res;
            } catch (e) {
                screen.value = "Error";
                setTimeout(clearScreen, 1500);
            }
        }
    </script>
</body>
</html>
